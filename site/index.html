<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSV → JSON Converter</title>
    <meta name="description" content="Convert UTF-8 CSV to JSON" />
    <style>
      body {
        margin: 0;
        padding: 2rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        background: #f6f2ec;
      }
      p { color: #666; }
    </style>
  </head>
  <body>
    <h1>Redirecting...</h1>
    <p>Detecting your language preference...</p>

    <script>
      // Get stored language preference or detect from browser
      function getPreferredLanguage() {
        // Check for URL hash (user preference)
        const hash = window.location.hash.slice(1) || '';
        if (hash === 'ja' || hash === 'en') {
          return hash;
        }

        // Check for stored preference
        const stored = localStorage.getItem('app_lang');
        if (stored === 'ja' || stored === 'en') {
          return stored;
        }

        // Detect from browser language
        const browserLang = navigator.language || navigator.userLanguage;
        if (browserLang.startsWith('ja')) {
          return 'ja';
        }

        // Default to English
        return 'en';
      }

      // Redirect to appropriate language version
      const lang = getPreferredLanguage();
      localStorage.setItem('app_lang', lang);
      window.location.replace(`./${lang}/`);
    </script>
  </body>
</html>
